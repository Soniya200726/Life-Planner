<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Journal - Life Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR (same for all pages) -->
  <nav class="navbar">
    <div class="logo">LifePlanner</div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="tasks.html">Tasks</a></li>
      <li><a href="journal.html" class="active">Journal</a></li>
      <li><a href="goals.html">Goals</a></li>
    </ul>
  </nav>

<!-- JOURNAL HEADER -->

<section class="journal-header">
<h1>My Journal</h1>
<p>Write your thoughts and reflect on your day</p>
</section>


<!-- JOURNAL CONTAINER -->

<div class="journal-container">

<!-- NEW ENTRY -->

<section class="journal-entry">

<h2>New Entry</h2>

<input type="text" placeholder="Title">

<textarea placeholder="Write your thoughts here..." rows="6"></textarea>

<button>Add Entry</button>

</section>


<!-- PREVIOUS ENTRIES -->

<section class="journal-list">

<h2>Previous Entries</h2>

<div class="entry-card">
<h3>😊Productive Day</h3>
<p>Today I completed my UI design and practiced CSS.</p>
<span class="entry-date">04 Mar 2026</span>
</div>

<div class="entry-card">
<h3>📚Learning Progress</h3>
<p>I understood grid and flexbox clearly.</p>
<span class="entry-date">03 Mar 2026</span>
</div>

</section>

</div>

  

</body>
</html>
