<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Journal - Life Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR (same for all pages) -->
  <nav class="navbar">
    <div class="logo">LifePlanner</div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="tasks.html">Tasks</a></li>
      <li><a href="journal.html">Journal</a></li>
      <li><a href="goals.html">Goals</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <h1>My Journal</h1>
    <p>Write your thoughts and reflect on your day</p>
  </header>

  <!-- JOURNAL CONTENT -->
  <div class="journal-container">

    <!-- ADD JOURNAL ENTRY -->
    <section class="journal-form">
      <h2>New Entry</h2>
      <input type="text" placeholder="Title">
      <textarea placeholder="Write your thoughts here..."></textarea>
      <button>Add Entry</button>
    </section>

    <!-- JOURNAL ENTRIES -->
    <section class="journal-list">
      <h2>Previous Entries</h2>

      <div class="journal-card">
        <h3>Productive Day</h3>
        <p>Today I completed my UI design and practiced CSS.</p>
        <span>📅 04 Mar 2026</span>
      </div>

      <div class="journal-card">
        <h3>Learning Progress</h3>
        <p>I understood grid and flexbox clearly.</p>
        <span>📅 03 Mar 2026</span>
      </div>

    </section>

  </div>

</body>
</html>
